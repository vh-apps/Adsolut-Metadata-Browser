<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsolut Metadata Explorer</title>
    <style>
        :root {
            --bg: #0f1115; --surface: #1c1f26; --surface-hover: #252933;
            --border: #2d323e; --text: #e4e6eb; --text-muted: #9ca3af;
            --primary: #3b82f6; --primary-hover: #60a5fa;
            --rel: #f87171; --rel-bg: rgba(248, 113, 113, 0.12); --rel-border: #ef4444;
            --meta-bg: #161920; --label-nl: #60a5fa; --label-fr: #f472b6; --label-en: #34d399; --label-de: #fbbf24;
            --radius: 6px; --shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        * { box-sizing: border-box; outline: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; display: flex; }
        
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0; font-size: 1.1em; color: var(--primary); }
        .table-list { flex: 1; overflow-y: auto; padding: 8px; }
        .table-item { padding: 8px 12px; margin: 2px 0; border-radius: var(--radius); cursor: pointer; font-size: 0.9em; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .table-item:hover { background: var(--surface-hover); color: var(--primary-hover); }
        .table-item.active { background: var(--primary); color: #ffffff; font-weight: 500; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
        .breadcrumbs { font-size: 1.1em; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; }
        .breadcrumb-link { color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .breadcrumb-link:hover { color: var(--primary-hover); text-decoration: underline; }
        .search-input { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.95em; }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.25); }

        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .field-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; box-shadow: var(--shadow); overflow: hidden; transition: 0.2s; }
        .field-card:hover { border-color: var(--primary); }
        .field-card.is-relation { border-left: 3px solid var(--rel); }
        
        .field-header { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
        .field-header:hover { background: var(--surface-hover); }
        .field-main { display: flex; align-items: center; gap: 12px; flex: 1; }
        .field-name { font-family: ui-monospace, "Fira Code", Consolas, monospace; font-size: 0.95em; font-weight: 500; color: var(--text); }
        .field-nl { color: var(--label-nl); font-weight: 600; font-size: 0.9em; }
        .rel-badge { background: var(--rel); color: #0f1115; font-size: 0.7em; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .expand-icon { transition: 0.2s; color: var(--text-muted); font-size: 0.8em; }
        .field-card.expanded .expand-icon { transform: rotate(90deg); }
        
        .field-details { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); background: var(--meta-bg); }
        .field-card.expanded .field-details { display: block; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .lang-labels { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 12px 0; }
        .lang-item { display: flex; align-items: baseline; gap: 8px; font-size: 0.85em; }
        .lang-code { font-weight: 600; min-width: 30px; }
        .lang-code.nl { color: var(--label-nl); }
        .lang-code.fr { color: var(--label-fr); }
        .lang-code.en { color: var(--label-en); }
        .lang-code.de { color: var(--label-de); }
        .lang-text { color: var(--text-muted); }
        
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .meta-item { font-size: 0.8em; }
        .meta-label { color: var(--text-muted); display: block; margin-bottom: 2px; }
        .meta-value { color: var(--text); font-family: ui-monospace, monospace; }
        
        .rel-action { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: var(--radius); font-size: 0.85em; cursor: pointer; transition: 0.2s; }
        .rel-action:hover { background: var(--primary-hover); }
        
        .empty-state, .loader { text-align: center; color: var(--text-muted); margin-top: 40px; }
        .loader::after { content: ''; display: block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; margin: 16px auto 0; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>📁 Tables</h2>
    </div>
    <div class="table-list" id="tableList"></div>
</div>

<div class="main">
    <div class="toolbar">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search fields by name or Dutch label (NL)...">
    </div>
    <div class="content" id="fieldContainer">
        <div class="loader">Loading Adsolut metadata...</div>
    </div>
</div>

<script>
    const DB = { tables: {}, relations: [], tableNames: [] };
    let state = { currentTable: null, breadcrumbs: [] };

    const tableList = document.getElementById('tableList');
    const breadcrumbs = document.getElementById('breadcrumbs');
    const fieldContainer = document.getElementById('fieldContainer');
    const searchInput = document.getElementById('searchInput');

    async function init() {
        try {
            const response = await fetch('all_metadata.xml');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            parseXML(text);
            renderTableList();
            const startTable = DB.tableNames.find(t => t === 'relaties') || DB.tableNames[0];
            navigateTo(startTable);
        } catch (err) {
            fieldContainer.innerHTML = `<div class="empty-state">❌ Failed to load <code>all_metadata.xml</code><br><small>Use a local server or GitHub Pages (file:// blocked)</small></div>`;
        }
    }

    function parseXML(xmlText) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlText, "text/xml");
        const fps = doc.getElementsByTagName('fieldproperties');
        
        for (let i = 0; i < fps.length; i++) {
            const fp = fps[i];
            const table = fp.getElementsByTagName('tableproperties_tablename')[0]?.textContent;
            const field = fp.getElementsByTagName('fieldname')[0]?.textContent;
            
            if (table && field) {
                if (!DB.tables[table]) DB.tables[table] = { fields: [] };
                
                const fieldData = {
                    name: field,
                    nl: fp.getElementsByTagName('nl')[0]?.textContent || '',
                    fr: fp.getElementsByTagName('fr')[0]?.textContent || '',
                    en: fp.getElementsByTagName('en')[0]?.textContent || '',
                    de: fp.getElementsByTagName('de')[0]?.textContent || ''
                };
                
                // Try to extract additional metadata if available
                const charSize = fp.getElementsByTagName('charsize')[0]?.textContent;
                const dataType = fp.getElementsByTagName('datatype')[0]?.textContent;
                const defaultValue = fp.getElementsByTagName('defaultvalue')[0]?.textContent;
                const readonly = fp.getElementsByTagName('readonly')[0]?.textContent;
                const poplist = fp.getElementsByTagName('poplist')[0]?.textContent;
                
                if (charSize) fieldData.charSize = charSize;
                if (dataType) fieldData.dataType = dataType;
                if (defaultValue !== undefined) fieldData.defaultValue = defaultValue;
                if (readonly) fieldData.readonly = readonly === 'True';
                if (poplist) fieldData.poplist = poplist === 'True';
                
                DB.tables[table].fields.push(fieldData);
            }
        }

        // Detect relationships
        DB.tableNames = Object.keys(DB.tables).sort();
        const sortedTables = [...DB.tableNames].sort((a,b) => b.length - a.length);
        
        for (let table of DB.tableNames) {
            for (let f of DB.tables[table].fields) {
                for (let target of sortedTables) {
                    if (target === table) continue;
                    const prefix = target + '_';
                    if (f.name.startsWith(prefix)) {
                        const potentialField = f.name.slice(prefix.length);
                        if (DB.tables[target] && DB.tables[target].fields.some(tf => tf.name === potentialField)) {
                            f.relTarget = target;
                            f.relField = potentialField;
                            break;
                        }
                    }
                }
            }
        }
    }

    function renderTableList() {
        tableList.innerHTML = '';
        DB.tableNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'table-item';
            div.textContent = name;
            if (name === state.currentTable) div.classList.add('active');
            div.onclick = () => { state.breadcrumbs = []; navigateTo(name); };
            tableList.appendChild(div);
        });
    }

    function navigateTo(tableName) {
        state.currentTable = tableName;
        state.breadcrumbs.push(tableName);
        searchInput.value = '';
        renderTableList();
        renderBreadcrumbs();
        renderFields();
    }

    function renderBreadcrumbs() {
        breadcrumbs.innerHTML = '';
        state.breadcrumbs.forEach((name, index) => {
            if (index > 0) {
                const sep = document.createElement('span');
                sep.textContent = '›';
                sep.style.color = '#4b5563';
                breadcrumbs.appendChild(sep);
            }
            const span = document.createElement('span');
            span.textContent = name;
            if (index === state.breadcrumbs.length - 1) {
                span.style.color = 'var(--text)';
                span.style.cursor = 'default';
            } else {
                span.className = 'breadcrumb-link';
                span.onclick = () => {
                    state.breadcrumbs = state.breadcrumbs.slice(0, index + 1);
                    state.currentTable = name;
                    renderBreadcrumbs();
                    renderFields();
                    renderTableList();
                };
            }
            breadcrumbs.appendChild(span);
        });
    }

    function toggleField(card) {
        card.classList.toggle('expanded');
    }

    function renderFields() {
        fieldContainer.innerHTML = '';
        const tableData = DB.tables[state.currentTable];
        if (!tableData) return;

        const query = searchInput.value.toLowerCase();
        const filtered = tableData.fields.filter(f => 
            f.name.toLowerCase().includes(query) || 
            f.nl.toLowerCase().includes(query) ||
            f.fr.toLowerCase().includes(query) ||
            f.en.toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            fieldContainer.innerHTML = '<div class="empty-state">No fields match your search.</div>';
            return;
        }

        filtered.forEach(f => {
            const card = document.createElement('div');
            card.className = 'field-card' + (f.relTarget ? ' is-relation' : '');
            
            const header = document.createElement('div');
            header.className = 'field-header';
            header.onclick = (e) => {
                if (!e.target.closest('.rel-action')) toggleField(card);
            };
            
            const main = document.createElement('div');
            main.className = 'field-main';
            
            const nameEl = document.createElement('div');
            nameEl.className = 'field-name';
            nameEl.textContent = f.name;
            
            if (f.relTarget) {
                const badge = document.createElement('span');
                badge.className = 'rel-badge';
                badge.textContent = 'REL';
                nameEl.appendChild(badge);
            }
            
            const nlEl = document.createElement('div');
            nlEl.className = 'field-nl';
            nlEl.textContent = f.nl || '—';
            
            main.appendChild(nameEl);
            main.appendChild(nlEl);
            
            const expandIcon = document.createElement('span');
            expandIcon.className = 'expand-icon';
            expandIcon.textContent = '▶';
            
            header.appendChild(main);
            header.appendChild(expandIcon);
            
            // Details section
            const details = document.createElement('div');
            details.className = 'field-details';
            
            // Language labels
            const langDiv = document.createElement('div');
            langDiv.className = 'lang-labels';
            langDiv.innerHTML = `
                <div class="lang-item"><span class="lang-code nl">NL:</span><span class="lang-text">${f.nl || '—'}</span></div>
                <div class="lang-item"><span class="lang-code fr">FR:</span><span class="lang-text">${f.fr || '—'}</span></div>
                <div class="lang-item"><span class="lang-code en">EN:</span><span class="lang-text">${f.en || '—'}</span></div>
                <div class="lang-item"><span class="lang-code de">DE:</span><span class="lang-text">${f.de || '—'}</span></div>
            `;
            details.appendChild(langDiv);
            
            // Metadata grid
            const metaGrid = document.createElement('div');
            metaGrid.className = 'meta-grid';
            
            const metaFields = [
                { label: 'Data Type', value: f.dataType },
                { label: 'Char Size', value: f.charSize },
                { label: 'Default Value', value: f.defaultValue },
                { label: 'Read Only', value: f.readonly !== undefined ? (f.readonly ? 'Yes' : 'No') : undefined },
                { label: 'Popup List', value: f.poplist !== undefined ? (f.poplist ? 'Yes' : 'No') : undefined }
            ];
            
            metaFields.forEach(meta => {
                if (meta.value !== undefined && meta.value !== '') {
                    const item = document.createElement('div');
                    item.className = 'meta-item';
                    item.innerHTML = `<span class="meta-label">${meta.label}</span><span class="meta-value">${meta.value}</span>`;
                    metaGrid.appendChild(item);
                }
            });
            
            if (metaGrid.children.length > 0) {
                details.appendChild(metaGrid);
            }
            
            // Relation button
            if (f.relTarget) {
                const btn = document.createElement('button');
                btn.className = 'rel-action';
                btn.textContent = `🔗 Open ${f.relTarget}`;
                btn.style.marginTop = '12px';
                btn.onclick = () => navigateTo(f.relTarget);
                details.appendChild(btn);
            }
            
            card.appendChild(header);
            card.appendChild(details);
            fieldContainer.appendChild(card);
        });
    }

    searchInput.addEventListener('input', renderFields);
    init();
</script>

</body>
</html>
